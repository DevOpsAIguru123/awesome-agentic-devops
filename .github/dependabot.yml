version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Chicago
    groups:
      non-breaking-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Chicago
    groups:
      non-breaking-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directories:
      - /agents/adk/terraform-drift-detector
      - /agents/adk/terraform-plan-reviewer
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Chicago
    groups:
      non-breaking-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: terraform
    directory: /agents/adk/terraform-plan-reviewer/terraform/gcs-sample
    schedule:
      interval: daily
      time: "06:00"
      timezone: America/Chicago
    groups:
      non-breaking-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
