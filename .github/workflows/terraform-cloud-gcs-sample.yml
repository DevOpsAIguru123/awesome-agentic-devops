name: Terraform Cloud GCS Sample

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frameworks/gemini-adk/terraform-plan-reviewer/terraform/gcs-sample
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
      TF_IN_AUTOMATION: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.15.7

      - name: Initialize Terraform Cloud
        run: terraform init -input=false

      - name: Apply via Terraform Cloud
        run: terraform apply -input=false -auto-approve -no-color
